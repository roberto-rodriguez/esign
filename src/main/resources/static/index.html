<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>E-Sign Agreements</title>
    <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="container">
    <header>
        <h1 id="title">E-Sign Consent</h1>
        <div class="lang-switch" role="group" aria-label="Language switch">
            <button id="lang-en" class="active">EN</button>
            <button id="lang-es">ES</button>
        </div>
    </header>

    <section class="card">
        <h2 id="welcome"></h2>
        <p id="instructions"></p>

        <div class="doc-actions">
            <button id="open-esign" class="btn">Open E-Sign Agreement</button>
            <button id="open-others" class="btn">Open Other Agreements</button>
        </div>

        <div class="viewer-wrap">
            <iframe id="pdf-viewer" title="PDF viewer"></iframe>
        </div>

        <div class="checks">
            <label><input type="checkbox" id="check-esign" disabled/> <span id="text-esign"></span></label>
            <label><input type="checkbox" id="check-others" disabled/> <span id="text-others"></span></label>
        </div>

        <button id="submit" class="btn submit" disabled>Submit</button>
        <p id="message"></p>
    </section>
</div>
<script src="/js/app.js"></script>
</body>
</html>
